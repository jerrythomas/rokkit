<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      ;(function () {
        try {
          var t = JSON.parse(localStorage.getItem('rokkit-demo-theme') || '{}')
          var b = document.body
          b.dataset.style = t.style || 'rokkit'
          b.dataset.mode = t.mode || 'dark'
          b.dataset.density = t.density || 'comfortable'
        } catch (e) {}
      })()
    </script>
    <div style="display:contents">%sveltekit.body%</div>
  </body>
</html>
