<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sensei — Observatory</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      ;(function () {
        try {
          var t = JSON.parse(localStorage.getItem('sensei-theme') || '{}')
          var b = document.body
          b.dataset.style = t.style || ''
          b.dataset.mode = t.mode || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
          b.dataset.density = t.density || 'comfortable'
        } catch (e) {}
      })()
    </script>
    <div style="display:contents" data-app-shell>%sveltekit.body%</div>
  </body>
</html>
