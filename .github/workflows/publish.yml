name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install

      - name: Build packages that need pre-publish compilation
        run: |
          # Themes: compile src/ CSS with UnoCSS → dist/
          (cd packages/themes && bun run build.mjs)
          # UnoCSS: compile TypeScript declarations
          (cd packages/unocss && bunx tsc --project tsconfig.build.json 2>/dev/null || true)

      - name: Publish packages
        env:
          NODE_NO_WARNINGS: 1
        run: |
          # Publish in dependency order so each package's deps are already on npm
          PACKAGES=(helpers cli icons core data actions themes unocss states ui forms blocks app chart stories)
          VERSION=$(node -p "require('./packages/helpers/package.json').version")
          # All versions publish with 'latest' tag.
          for name in "${PACKAGES[@]}"; do
            pkg="./packages/${name}/package.json"
            [ -f "$pkg" ] || continue
            grep -q '"private": true' "$pkg" 2>/dev/null && continue
            PKG_NAME=$(node -p "require('$pkg').name")
            # skip if already published (handles partial/retried runs)
            if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
              echo "Skipping ${PKG_NAME}@${VERSION} — already published"
              continue
            fi
            # bun pm pack rewrites workspace:* deps automatically
            # Continue on publish failures (e.g. ghost versions from prior failed
            # runs where provenance was signed but publish was rejected by npm)
            (
              cd "./packages/${name}"
              TARBALL=$(bun pm pack | grep '\.tgz$')
              bunx npm publish "$TARBALL" --provenance --access public --tag latest || {
                echo "::warning::Failed to publish ${PKG_NAME}@${VERSION} — may need manual retry"
              }
              rm -f "$TARBALL"
            )
          done

      - name: Create GitHub release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
