name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          NODE_NO_WARNINGS: 1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for dir in ./packages/*/; do
            pkg="${dir}package.json"
            grep -q '"private": true' "$pkg" 2>/dev/null && continue
            # rewrite workspace:* and workspace:latest → actual version in a temp copy
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              for (const section of ['dependencies','peerDependencies']) {
                for (const [k,v] of Object.entries(p[section] || {})) {
                  if (v.startsWith('workspace:')) p[section][k] = '$VERSION';
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
            (cd "$dir" && npm publish --provenance --access public --tag latest)
            # restore original
            git checkout -- "$pkg"
          done

      - name: Create GitHub release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
