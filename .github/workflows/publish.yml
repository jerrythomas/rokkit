name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install

      - name: Publish packages
        env:
          NODE_NO_WARNINGS: 1
        run: |
          # Publish in dependency order so each package's deps are already on npm
          PACKAGES=(helpers cli icons core data actions themes unocss states ui forms blocks app chart stories)
          VERSION=$(node -p "require('./packages/helpers/package.json').version")
          for name in "${PACKAGES[@]}"; do
            pkg="./packages/${name}/package.json"
            [ -f "$pkg" ] || continue
            grep -q '"private": true' "$pkg" 2>/dev/null && continue
            PKG_NAME=$(node -p "require('$pkg').name")
            # skip if already published (handles partial/retried runs)
            if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
              echo "Skipping ${PKG_NAME}@${VERSION} — already published"
              continue
            fi
            (
              cd "./packages/${name}"
              # Run prepublishOnly if defined (builds dist/, compiles TS, etc.)
              if node -e "const s=require('./package.json').scripts||{}; process.exit(s.prepublishOnly?0:1)" 2>/dev/null; then
                echo "Building ${PKG_NAME}..."
                bun run prepublishOnly
              fi
              # bun pm pack rewrites workspace:* deps; doesn't run lifecycle scripts
              TARBALL=$(bun pm pack | grep '\.tgz$')
              bunx npm publish "$TARBALL" --provenance --access public --tag latest || {
                echo "::warning::Failed to publish ${PKG_NAME}@${VERSION} — may need manual retry"
              }
              rm -f "$TARBALL"
            )
          done

      - name: Create GitHub release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
