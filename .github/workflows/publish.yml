name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: bun install

      - name: Publish packages
        env:
          NODE_NO_WARNINGS: 1
        run: |
          # Publish in dependency order so each package's deps are already on npm
          PACKAGES=(helpers cli icons core data actions themes unocss states ui forms blocks app chart stories)
          VERSION=$(node -p "require('./packages/helpers/package.json').version")
          # All versions publish with 'latest' tag; pre-release versions also get 'next' tag via alias
          # Note: npm dist-tag add requires token auth which OIDC provenance doesn't support,
          # so we publish directly with 'latest' for all versions (pre-release included).
          for name in "${PACKAGES[@]}"; do
            pkg="./packages/${name}/package.json"
            [ -f "$pkg" ] || continue
            grep -q '"private": true' "$pkg" 2>/dev/null && continue
            PKG_NAME=$(node -p "require('$pkg').name")
            # skip if already published (handles partial/retried runs)
            if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
              echo "Skipping ${PKG_NAME}@${VERSION} — already published"
              continue
            fi
            # rewrite workspace:* and workspace:latest → "latest"
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              for (const section of ['dependencies','peerDependencies']) {
                for (const [k,v] of Object.entries(p[section] || {})) {
                  if (v.startsWith('workspace:')) p[section][k] = 'latest';
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
            (cd "./packages/${name}" && npm publish --provenance --access public --tag latest)
            git checkout -- "$pkg"
          done

      - name: Create GitHub release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
